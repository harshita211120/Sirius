<!DOCTYPE html>
<html>
<head>
    <title>Sirius - Add Task</title>

<style>

body {
    margin: 0;
    background: #000000;
    font-family: Arial, sans-serif;
    color: white;
}

/* Add Button */
.add-btn {
    position: fixed;
    top: 30px;
    right: 40px;
    padding: 12px 28px;
    background: linear-gradient(45deg, #B3005E, #E90064);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.add-btn:hover {
    box-shadow: 0 0 20px #E90064;
}

/* Overlay */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
}

/* Modal Box */
.modal-box {
    background: linear-gradient(135deg, #050510, #0b0f2a);
    padding: 45px;
    width: 620px;
    border-radius: 25px;
    border: 1px solid #E90064;
    box-shadow: 0 0 35px rgba(233, 0, 100, 0.7);
    transform: scale(0.95);
    animation: popUp 0.3s ease forwards;
}

/* Animations */
@keyframes popUp {
    to {
        transform: scale(1);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Heading */
h2 {
    color: #FF5F9E;
    margin-bottom: 25px;
}

/* Inputs */
.input-field {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #0f172a;
    border: 1px solid #333;
    border-radius: 14px;
    color: white;
    transition: 0.3s;
}

.input-field:focus {
    outline: none;
    border: 1px solid #E90064;
    box-shadow: 0 0 10px #E90064;
}

/* Textarea */
.textarea {
    height: 90px;
    resize: none;
}

/* Layout */
.row {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.column {
    flex: 1;
}

/* Buttons */
.button-row {
    margin-top: 35px;
    display: flex;
    justify-content: space-between;
}

.submit-btn {
    background: linear-gradient(45deg, #B3005E, #E90064);
    border: none;
    padding: 12px 30px;
    border-radius: 14px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    box-shadow: 0 0 25px #E90064;
}

.cancel-btn {
    background: transparent;
    border: none;
    color: #FF5F9E;
    font-size: 16px;
    cursor: pointer;
}

</style>
</head>

<body>

<button class="add-btn" onclick="openModal()">+ Add</button>

<div class="modal-overlay" id="taskModal">
    <div class="modal-box">

        <h2>Add New Task</h2>

        <input type="text" class="input-field" placeholder="Task title...">

        <textarea class="input-field textarea" placeholder="Description (optional)"></textarea>

        <div class="row">
    <div class="column">
        <label>Category</label>
        <select class="input-field">
            <option>Academic</option>
            <option>Personal</option>
            <option>Habit</option>
        </select>
    </div>

    <div class="column">
        <label>Deadline</label>
        <input type="date" class="input-field">
    </div>
</div>

<div class="row">
    <div class="column">
        <label>Est. minutes</label>
        <input type="number" class="input-field" value="25">
    </div>
</div>

<div class="recurring-row">
    <label class="recurring-label">
        <input type="checkbox" class="big-checkbox">
        <span>Recurring</span>
    </label>
</div>

<div class="button-row">
    <button class="submit-btn">+ Add Task</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
</div>

<script>

function openModal() {
    document.getElementById("taskModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("taskModal").style.display = "none";
}

</script>

</body>
</html>
