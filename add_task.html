<!DOCTYPE html>
<html>
<head>
    <title>Task Modal</title>
</head>
<body>

<button class="add-btn" onclick="openModal()">+ Add</button>

<div class="modal-overlay" id="taskModal">
    <div class="modal-box">

        <h2>Add New Task</h2>

        <input type="text" class="input-field" placeholder="Task title...">

        <textarea class="input-field textarea" placeholder="Description (optional)"></textarea>

        <div class="row">
            <div class="column">
                <label>Category</label>
                <select class="input-field">
                    <option>Academic</option>
                    <option>Personal</option>
                    <option>Habit</option>
                </select>
            </div>

            <div class="column">
                <label>Deadline</label>
                <input type="date" class="input-field">
            </div>
        </div>

        <div class="row">
            <div class="column">
                <label>Est. minutes</label>
                <input type="number" class="input-field" value="25">
            </div>

            <div class="column toggle-container">
                <label>Recurring</label>
                <input type="checkbox">
            </div>
        </div>

        <div class="button-row">
            <button class="submit-btn">+ Add Task</button>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>

    </div>
</div>

<style>

body {
    background: #000000;
    font-family: Arial, sans-serif;
    color: white;
}

.add-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 25px;
    background: #E90064;
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.add-btn:hover {
    background: #FF5F9E;
}

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6, 0, 71, 0.85); /* 6, 0, 71, 0.85 */
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #000000;
    padding: 35px;
    width: 600px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(233, 0, 100, 0.5);
}

h2 {
    color: #FF5F9E;
}

.input-field {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #676bb2;
    border: 1px solid #B3005E;
    border-radius: 10px;
    color: white;
}

.input-field:focus {
    outline: none;
    border-color: #E90064;
}

.textarea {
    height: 80px;
}

.row {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.column {
    flex: 1;
}

.button-row {
    margin-top: 30px;
    display: flex;
    justify-content: space-between;
}

.submit-btn {
    background: #B3005E;
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    background: #E90064;
}

.cancel-btn {
    background: transparent;
    border: none;
    color: #FF5F9E;
    cursor: pointer;
}

</style>

<script>

function openModal() {
    document.getElementById("taskModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("taskModal").style.display = "none";
}

</script>

</body>
</html>
