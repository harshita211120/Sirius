<!DOCTYPE html>
<html>
<head>
    <title>Sirius - Deep Work</title>

<style>

body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    padding: 60px 20px;
}

/* Title */
h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.subtitle {
    color: #9ca3af;
    margin-bottom: 40px;
}

/* Task Card */
.task-card {
    width: 500px;
    margin: 20px auto;
    padding: 20px 25px;
    border-radius: 18px;
    border: 1px solid #1f1f1f;
    background: linear-gradient(135deg, #050510, #0b0f2a);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: 0.3s;
}

.task-card:hover {
    border: 1px solid #00d4ff;
    box-shadow: 0 0 20px rgba(0,212,255,0.6);
}

/* Left */
.task-left {
    display: flex;
    align-items: center;
    gap: 15px;
    font-size: 18px;
}

/* Play Button */
.play-btn {
    background: transparent;
    border: 1px solid #00d4ff;
    color: #00d4ff;
    padding: 8px 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.play-btn:hover {
    background: #00d4ff;
    color: black;
}

/* Timer Section */
.timer-section {
    margin-top: 50px;
    display: none;
}

.timer {
    font-size: 50px;
    margin: 20px 0;
    color: #E90064;
}

.stop-btn {
    background: #E90064;
    border: none;
    padding: 12px 25px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.stop-btn:hover {
    box-shadow: 0 0 20px #E90064;
}

</style>
</head>

<body>

<h1>Start Deep Work</h1>
<div class="subtitle">
    Select a task to begin a Pomodoro session.
</div>

<!-- Task List -->
<div id="taskList"></div>

<!-- Timer -->
<div class="timer-section" id="timerSection">
    <h2 id="activeTask"></h2>
    <div class="timer" id="timer">25:00</div>
    <button class="stop-btn" onclick="stopTimer()">Stop</button>
</div>

<script>

// Example tasks (replace later with backend)
let tasks = [
    "Basket ball",
    "IFS assignment"
];

let timerInterval;
let timeLeft = 25 * 60;

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach(task => {
        list.innerHTML += `
            <div class="task-card">
                <div class="task-left">
                    ▶ ${task}
                </div>
                <button class="play-btn" onclick="startTimer('${task}')">
                    Play
                </button>
            </div>
        `;
    });
}

function startTimer(taskName) {
    document.getElementById("taskList").style.display = "none";
    document.getElementById("timerSection").style.display = "block";
    document.getElementById("activeTask").innerText = taskName;

    timeLeft = 25 * 60;

    timerInterval = setInterval(() => {
        timeLeft--;

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        document.getElementById("timer").innerText =
            `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("Session Completed 🎉");
        }

    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById("timerSection").style.display = "none";
    document.getElementById("taskList").style.display = "block";
}

renderTasks();

</script>

</body>
</html>
